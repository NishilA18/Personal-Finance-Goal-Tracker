<!DOCTYPE html>
<html>
<head>
    <title>💰 Finance Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: auto; }
        .card { background: #f5f5f5; padding: 20px; margin: 10px 0; border-radius: 10px; }
        input, button { margin: 5px; padding: 10px; }
        .progress { background: #ddd; height: 20px; border-radius: 10px; }
        .progress-bar { background: #4caf50; height: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>💰 Finance Goal Tracker</h1>
    
    <!-- Goals -->
    <div class="card">
        <h2>🎯 Add Goal</h2>
        <input id="goalName" placeholder="Goal name">
        <input id="goalTarget" placeholder="Target amount" type="number">
        <input id="goalDeadline" type="date">
        <button onclick="addGoal()">Add Goal</button>
        <div id="goals"></div>
    </div>

    <!-- Transactions -->
    <div class="card">
        <h2>💸 Add Transaction</h2>
        <input id="txnDesc" placeholder="Description">
        <input id="txnAmount" placeholder="Amount" type="number">
        <button onclick="addTransaction()">Add Transaction</button>
        <div id="transactions"></div>
    </div>

    <div class="card" id="summary">
        <h2>📊 Summary</h2>
        <p>Total Saved: $<span id="total">0</span></p>
        <p>Goals: <span id="count">0</span></p>
    </div>

    <script>
        // Store data in memory (resets on refresh - simple!)
        let goals = [];
        let transactions = [];

        function addGoal() {
            const name = document.getElementById('goalName').value;
            const target = parseFloat(document.getElementById('goalTarget').value);
            const deadline = document.getElementById('goalDeadline').value;
            if (!name || !target || !deadline) return alert('Fill all fields');
            
            goals.push({ id: Date.now(), name, target_amount: target, current_amount: 0, deadline });
            document.getElementById('goalName').value = '';
            document.getElementById('goalTarget').value = '';
            document.getElementById('goalDeadline').value = '';
            renderAll();
        }

        function addTransaction() {
            const desc = document.getElementById('txnDesc').value;
            const amount = parseFloat(document.getElementById('txnAmount').value);
            if (!desc || !amount) return alert('Fill all fields');
            
            transactions.push({ id: Date.now(), description: desc, amount });
            document.getElementById('txnDesc').value = '';
            document.getElementById('txnAmount').value = '';
            
            // Auto-add to goals (first goal gets 50% of transaction)
            if (goals.length > 0) {
                goals[0].current_amount += amount * 0.5;
            }
            renderAll();
        }

        function renderAll() {
            // Render goals
            const goalsDiv = document.getElementById('goals');
            goalsDiv.innerHTML = goals.map(g => `
                <div style="margin:10px 0; border-bottom:1px solid #ddd; padding:10px">
                    <b>${g.name}</b> - $${g.current_amount} / $${g.target_amount}
                    <div class="progress">
                        <div class="progress-bar" style="width: ${Math.min((g.current_amount/g.target_amount)*100, 100)}%"></div>
                    </div>
                </div>
            `).join('');

            // Render transactions
            const txnDiv = document.getElementById('transactions');
            txnDiv.innerHTML = transactions.map(t => `
                <div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee">
                    <span>${t.description}</span>
                    <span>$${t.amount}</span>
                </div>
            `).join('');

            // Update summary
            const total = transactions.reduce((sum, t) => sum + t.amount, 0);
            document.getElementById('total').textContent = total;
            document.getElementById('count').textContent = goals.length;
        }

        // Add sample data
        goals.push({ id: 1, name: 'Vacation', target_amount: 2000, current_amount: 450, deadline: '2026-12-31' });
        transactions.push({ id: 1, description: 'Initial savings', amount: 450 });
        renderAll();
    </script>
</body>
</html><!-- finance.html -->
